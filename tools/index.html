<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>

<body>
  <script src="/src/header.js"></script>
  <div id="overview" class="page-grid">
    <div id="overview-grid">
      <a class="tool-card" href="?tool=sdf">
        <div class="tool-card-preview"></div>
        <span class="tool-card-name">sdf</span>
      </a>
      <a class="tool-card" href="?tool=quadtree">
        <div class="tool-card-preview"></div>
        <span class="tool-card-name">quadtree</span>
      </a>
      <a class="tool-card" href="?tool=sand">
        <div class="tool-card-preview"></div>
        <span class="tool-card-name">sand</span>
      </a>
      <a class="tool-card" href="?tool=rd">
        <div class="tool-card-preview"></div>
        <span class="tool-card-name">rd</span>
      </a>
      <a class="tool-card" href="?tool=resampling">
        <div class="tool-card-preview"></div>
        <span class="tool-card-name">resampling</span>
      </a>
    </div>
  </div>

  <div id="app" hidden>
    <nav id="tool-switcher">
      <a href="./" class="tool-switch-link">overview</a>
      <a href="?tool=sdf" class="tool-switch-link" data-tool="sdf">sdf</a>
      <a href="?tool=quadtree" class="tool-switch-link" data-tool="quadtree">quadtree</a>
      <a href="?tool=sand" class="tool-switch-link" data-tool="sand">sand</a>
      <a href="?tool=rd" class="tool-switch-link" data-tool="rd">rd</a>
      <a href="?tool=resampling" class="tool-switch-link" data-tool="resampling">resampling</a>
    </nav>
    <div id="editor-panel">
      <div id="editor"></div>
    </div>
    <div id="canvas-panel">
      <canvas id="sketch"></canvas>
      <div id="error-display"></div>
    </div>
  </div>
  <div id="bottom-bar" hidden>
    <div id="save-bar">
      <button id="btn-reset">reset</button>
      <button id="btn-save-png">png</button>
      <button id="btn-save-svg" disabled>svg</button>
      <button id="btn-record">record</button>
    </div>
    <div id="export-bar">
      <input id="export-w" type="number" value="8185" title="export width (px)">
      <span>&times;</span>
      <input id="export-h" type="number" value="600" title="export height (px)">
      <span>px &nbsp;</span>
      <input id="export-fps" type="number" value="25" title="frames per second">
      <span>fps &nbsp;</span>
      <input id="export-frames" type="number" value="250" title="total frames">
      <span>fr</span>
      <button id="btn-export">export</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
