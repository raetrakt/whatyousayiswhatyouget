<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    #app {
      display: flex;
      height: 100dvh;
    }

    #canvas-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #editor-panel {
      padding: 24px;
    }

    @font-face {
      font-family: 'TrueSansMono';
      src: url('../assets/fonts/TrueSansMono-RegularWeb.woff') format('woff');
    }

    .cm-editor .cm-content {
      font-family: 'TrueSansMono', monospace;
      font-feature-settings: 'liga' 0;
    }

    .ͼb,
    .ͼl {
      color: black;
    }

    .ͼm {
      color: #858585;
    }

    .ͼd {
      color: rgb(3, 128, 78);
    }

    #sketch {
      border: 1px solid;
    }

    #error-display {
      display: none;
      font-family: 'TrueSansMono', monospace;
      font-size: 13px;
      color: #cc0000;
    }

    #bottom-bar {
      position: fixed;
      bottom: 24px;
      left: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    #tool-nav {
      display: flex;
      gap: 6px;
    }

    .tool-btn {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      letter-spacing: 0.04em;
      border: 1px solid black;
      background: white;
      padding: 4px 10px;
      cursor: pointer;
      text-decoration: none;
      color: black;
      display: inline-block;
    }

    .tool-btn:hover,
    .tool-btn.active {
      background: black;
      color: white;
    }

    #save-bar {
      display: flex;
      gap: 6px;
    }

    #save-bar button {
      font-family: 'Times New Roman', Times, serif;
      font-size: 16px;
      letter-spacing: 0.04em;
      border: 1px solid black;
      background: white;
      padding: 4px 10px;
      cursor: pointer;
    }

    #save-bar button:hover {
      background: black;
      color: white;
    }

    #save-bar button:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="editor-panel">
      <div id="editor"></div>
    </div>
    <div id="canvas-panel">
      <canvas id="sketch"></canvas>
      <div id="error-display"></div>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="tool-nav">
      <a href="./" class="tool-btn" data-tool="sdf">sdf</a>
      <a href="./?tool=quadtree" class="tool-btn" data-tool="quadtree">quadtree</a>
      <a href="./?tool=sand" class="tool-btn" data-tool="sand">sand</a>
      <a href="./?tool=rd" class="tool-btn" data-tool="rd">rd</a>
    </div>
    <div id="save-bar">
      <button id="btn-reset">reset</button>
      <button id="btn-save-png">png</button>
      <button id="btn-save-svg" disabled>svg</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
