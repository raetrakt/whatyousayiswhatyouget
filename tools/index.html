<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What You Say Is What You Get?</title>
  <link rel="icon" href="../assets/svg/title_layout.svg" />
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>

<body>
  <script src="/src/header.js"></script>
  <div id="overview" class="page-grid">
    <div id="overview-grid">
      <a class="tool-card" href="?tool=sdf">
        <div class="tool-card-preview">
          <img src="sdf/signed_distance_function.png" alt="" srcset="">
        </div>
        <span class="tool-card-name">Signed Distance Field</span>
      </a>
      <a class="tool-card" href="?tool=quadtree">
        <div class="tool-card-preview">
          <img src="quadtree/quadtree.png" alt="" srcset="">
        </div>
        <span class="tool-card-name">Quadtree</span>
      </a>
      <a class="tool-card" href="?tool=sand">
        <div class="tool-card-preview">
          <img src="sand/sand.png" alt="" srcset="">
        </div>
        <span class="tool-card-name">Falling Sand Simulation</span>
      </a>
      <a class="tool-card" href="?tool=rd">
        <div class="tool-card-preview">
          <img src="rd/reaction_diffusion.png" alt="" srcset="">
        </div>
        <span class="tool-card-name">Reaction Diffusion</span>
      </a>
      <a class="tool-card" href="?tool=resampling">
        <div class="tool-card-preview">
          <img src="resampling/resampling.png" alt="" srcset="">
        </div>
        <span class="tool-card-name">Path Resampling</span>
      </a>
    </div>
  </div>

  <div id="app" hidden>
    <nav id="tool-switcher">
      <a href="./" class="tool-switch-link">Back to Overview</a>
      <a href="?tool=sdf" class="tool-switch-link" data-tool="sdf">Signed Distance Field</a>
      <a href="?tool=quadtree" class="tool-switch-link" data-tool="quadtree">Quadtree</a>
      <a href="?tool=sand" class="tool-switch-link" data-tool="sand">Falling Sand Simulation</a>
      <a href="?tool=rd" class="tool-switch-link" data-tool="rd">Reaction Diffusion</a>
      <a href="?tool=resampling" class="tool-switch-link" data-tool="resampling">Path Resampling</a>
      <button id="btn-reset">Reset Canvas</button>
      <button id="btn-reset-code">Reset Code</button>
      <button id="btn-save-png">Save PNG</button>
      <button id="btn-save-svg" disabled>Save SVG</button>
      <button id="btn-record">Start Recording</button>
    </nav>
    <div id="editor-panel">
      <div id="editor"></div>
    </div>
    <div id="canvas-panel">
      <canvas id="sketch"></canvas>
      <div id="error-display"></div>
    </div>
  </div>
  <div id="bottom-bar" hidden>
    <div id="save-bar">
    </div>
  </div>
  <script type="module" src="./main.js"></script>
  <script>
    document.querySelector('#overview-grid').addEventListener('wheel', (e) => {
      e.preventDefault();
      e.currentTarget.scrollLeft += e.deltaY;
    }, { passive: false });
  </script>
</body>

</html>
